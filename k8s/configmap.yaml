apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  APP_PORT: "8080"
  DB_HOST: postgres-service
  DB_PORT: "5432"
  DB_NAME: authapp
  DB_USER: postgres
  DATABASE_URL: postgresql://postgres:12345678@postgres-service:5432/authapp
  REDIS_HOST: redis-service
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_URL: redis://redis-service:6379/0
  DEBUG: "false"
  LOG_LEVEL: info
